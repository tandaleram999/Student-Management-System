<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="ISO-8859-1">
<title>Student | Page</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
 <div th:replace="fragments/header :: header"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
 





<div class="container">
<div class="text-center"> 
<h3>Student List</h3>
</div>
<div class="row">
<div class= "col-lg-3">
<a th:href="@{students/new}" class="btn btn-primary btn-sm mb-3">Add New Student</a>
</div>
</div>



<table class="table table-striped table-bordered">
<thead>
<tr>
<th>Id</th>
<th> First Name</th>
<th> Last Name</th>  
<th> Mobile No</th>
<th> Mail</th>
<th> Class Branch</th>
<th>Action</th>
</tr>
</thead>

<tbody>

<tr th:each="student : ${Students}">
<td th:text="${student.id}"></td>
<td th:text="${student.firstName}"></td>
<td th:text="${student.lastName}"></td>
<td th:text="${student.mobileNo}"></td>
<td th:text="${student.mail}"></td>
<td th:text="${student.classBranch}"></td>
<td>
<a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn btn-primary btn-sm">Update</a>
       
<a th:href="@{/students/delete/{id}(id=${student.id})}"  class="btn btn-danger btn-sm"  onclick="return confirm('Are you sure you want to delete Data ?')">Delete</a>

</td>

</tr>
</tbody>

</table>
</div>

</body>
</html>
