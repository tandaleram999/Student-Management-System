<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="ISO-8859-1">
<title>Home | SRMS</title>
<link rel="stylesheet" th:href="@{/css/style.css}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(to right, #4facfe, #00f2fe);
        color: white;
    }
    .card {
        border-radius: 15px;
    }
</style>

</head>
<body>
<div th:replace="fragments/header :: header"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Hero Section -->
<div class="container text-center mt-5">

    <h1 class="display-4 fw-bold">🎓Student Result Management System🎓</h1>
    <p class="lead">Manage student data easily and efficiently</p>

    <a th:href="@{/students}" class="btn btn-light btn-lg mt-3">
        Go to Student Management
    </a>

</div>

<!-- Cards Section -->
<div class="container mt-5">
    <div class="row text-center">

        <!-- Add Student -->
        <div class="col-md-4">
            <div class="card shadow p-4 text-dark">
                <h4>Add Student</h4>
                <p>Create new student records</p>
                <a th:href="@{/students/new}" class="btn btn-success">Add</a>
            </div>
        </div>

        <!-- View Students -->
        <div class="col-md-4">
            <div class="card shadow p-4 text-dark">
                <h4>View Students</h4>
                <p>See all registered students</p>
                <a th:href="@{/students}" class="btn btn-primary">View</a>
            </div>
        </div>

        <!-- Manage -->
        <div class="col-md-4">
            <div class="card shadow p-4 text-dark">
                <h4>Manage</h4>
                <p>Update & Delete student data</p>
                <a th:href="@{/students}" class="btn btn-warning">Manage</a>
            </div>
        </div>

    </div>
</div>

<!-- Footer -->
 <div th:replace="fragments/footer :: footer"></div>

 

</body>
</html>
