<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="ISO-8859-1">
<title>Add New Student| Page </title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>
<body>

<div class="container mt-5">
    <div class="card shadow">
        
        <div class="card-header bg-dark text-white">
            <h3>Student Registration Form</h3>
        </div>

        <div class="card-body">
            <form th:action="@{/students}" th:object="${student}" method="post">

                <!-- First Name -->
                <div class="mb-3">
                    <label class="form-label">First Name</label>
                    <input type="text" th:field="*{firstName}" 
                           class="form-control" placeholder="Enter first name" required>
                </div>

                <!-- Last Name -->
                <div class="mb-3">
                    <label class="form-label">Last Name</label>
                    <input type="text" th:field="*{lastName}" 
                           class="form-control" placeholder="Enter last name" required>
                </div>

                <!-- Mobile Number -->
                <div class="mb-3">
                    <label class="form-label">Mobile Number</label>
                    <input type="text-numerical" th:field="*{mobileNo}" 
                           class="form-control" placeholder="Enter mobile number" required>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{mail}" 
                           class="form-control" placeholder="Enter email" required>
                </div>

                <!-- Class / Branch -->
                <div class="mb-3">
                    <label class="form-label">Class & Branch</label>
                    <input type="text" th:field="*{classBranch}" 
                           class="form-control" placeholder="Enter Class & Branch">
                </div>

                <!-- Submit Button -->
                <div class="text-center">
                    <button type="submit" class="btn btn-success">Register</button>
                    <a th:href="@{/students}" class="btn btn-secondary">Back</a>
                </div>

            </form>
        </div>

    </div>
</div>

</body>
</html>
